<html>

  <style>

      display: flex;

    }

    .popup-container {
            padding: 5px;
            display: flex;

<body>
    <div class="popup-container" style="display: none;">

      </div>
  
      <div>
        <img src="./image/judge.gif" alt="judging" width="150">

      </div>
    </div>
  
  <script src="script.js"></script>

</html>
